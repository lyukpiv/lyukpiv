name: Build and Test Java Project
on: [push]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Java
        uses: actions/setup-java@v2
        with:
          java-version: '17'
      - name: Run build and test
        run: mvn clean install
      - name: Always pass
        run: echo 'Build and test successful!'